name: e2e

# Smoke-test suite. Builds the app fresh, boots `next start` against
# port 3000, runs the Playwright suite under `tests/e2e/`, uploads
# the report on failure. ~3 min wall-clock.
#
# Triggers on PRs and on direct pushes to main. The same suite can
# be run locally via `npm run e2e`, or against a deployed URL via
# `E2E_BASE_URL=https://achordion.xyz npm run e2e`.

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same ref when a new commit lands —
# we don't need stale failures stacking up.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          # Auth.js requires AUTH_SECRET to start its handlers; without
          # it the /api/auth/* routes 500 and every page that touches
          # SiteHeader (which calls useSession) cascades into failures.
          # The smoke suite hits unauthenticated surfaces only — any
          # 32-byte random string suffices for token signing in CI.
          AUTH_SECRET: ci-smoke-secret-not-used-anywhere-real
          # `next start` runs in production mode. Auth.js v5 in prod
          # rejects untrusted hosts unless AUTH_TRUST_HOST is set —
          # which is what we want for the localhost-bound CI run.
          # (Vercel deployments don't need this; Vercel sets the
          # equivalent automatically.)
          AUTH_TRUST_HOST: "true"
          # MusicBrainz OAuth client identifier. The provider list
          # endpoint references it; a placeholder keeps the catalogue
          # render path happy without any real OAuth flow being
          # exercised by the smoke suite.
          AUTH_MUSICBRAINZ_ID: ci-smoke-no-oauth-flow-tested
          AUTH_MUSICBRAINZ_SECRET: ci-smoke-no-oauth-flow-tested

      - name: Run Playwright suite
        run: npm run e2e
        env:
          CI: "true"
          AUTH_SECRET: ci-smoke-secret-not-used-anywhere-real
          AUTH_TRUST_HOST: "true"
          AUTH_MUSICBRAINZ_ID: ci-smoke-no-oauth-flow-tested
          AUTH_MUSICBRAINZ_SECRET: ci-smoke-no-oauth-flow-tested

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
