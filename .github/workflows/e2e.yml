name: e2e

# Smoke-test suite. Builds the app fresh, boots `next start` against
# port 3000, runs the Playwright suite under `tests/e2e/`, uploads
# the report on failure. ~3 min wall-clock.
#
# Triggers on PRs and on direct pushes to main. The same suite can
# be run locally via `npm run e2e`, or against a deployed URL via
# `E2E_BASE_URL=https://achordion.xyz npm run e2e`.

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same ref when a new commit lands —
# we don't need stale failures stacking up.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          # Build needs at least the public site URL set; everything
          # else has fallbacks. Smoke suite hits unauthenticated
          # surfaces only.
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Playwright suite
        run: npm run e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
